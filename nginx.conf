server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Gzip settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static files - Frontend build
    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        # Try finding the exact file. If not found, proxy to backend
        try_files $uri $uri/ @proxy_to_backend;
    }

    location = /sitemap.xml {
        root /usr/share/nginx/html;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Robots-Tag "index, follow";
    }

    location = /robots.txt {
        root /usr/share/nginx/html;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Robots-Tag "index, follow";
    }

    location @proxy_to_backend {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    # NEVER cache critical PWA entry points: index.html, service workers, manifest
    location ~* ^/(index\.html|sw\.js|manifest\.webmanifest|sitemap\.xml|robots\.txt)$|^/workbox-.*\.js$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    # Enable heavy caching and CORS for static, hashed assets (fonts, css, js)
    location ~* \.(?:css|js|jpg|svg|png|webp|woff2?|eot|ttf|otf|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    # Public results for OG tags (handled by backend)
    location /results/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
