stages:
  - deploy


deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "
        set -e;
        cd $DEPLOY_PATH;
        # Ensure hosts are known
        mkdir -p ~/.ssh;
        ssh-keyscan -H gitlab.com >> ~/.ssh/known_hosts 2>/dev/null;
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null;
        
        # Identity setup
        eval \$(ssh-agent -s);
        ssh-add ~/.ssh/id_rsa 2>/dev/null || ssh-add ~/.ssh/id_ed25519 2>/dev/null || echo 'Using default keys';

        git remote set-url origin git@gitlab.com:$CI_PROJECT_PATH.git;
        git fetch origin;
        git pull origin main;
        make prod-build;
        make prod-up;
      "
  only:
    - main
  environment:
    name: production
