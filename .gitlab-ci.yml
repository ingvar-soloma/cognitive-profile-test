stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: $CI_REGISTRY
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:latest
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:latest

.docker_login: &docker_login
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build_frontend:
  <<: *docker_login
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build 
        --build-arg VITE_API_URL="$VITE_API_URL"
        --build-arg VITE_GOOGLE_CLIENT_ID="$VITE_GOOGLE_CLIENT_ID"
        --build-arg VITE_TELEGRAM_BOT_NAME="$VITE_TELEGRAM_BOT_NAME"
        --build-arg VITE_TELEGRAM_CLIENT_ID="$VITE_TELEGRAM_CLIENT_ID"
        --build-arg VITE_ADMIN_TELEGRAM_IDS="$VITE_ADMIN_TELEGRAM_IDS"
        -t $FRONTEND_IMAGE .
    - docker push $FRONTEND_IMAGE
  only:
    - main

build_backend:
  <<: *docker_login
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t $BACKEND_IMAGE ./backend
    - docker push $BACKEND_IMAGE
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "
        set -e;
        cd $DEPLOY_PATH;

        echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY;

        export BACKEND_IMAGE=$BACKEND_IMAGE;
        export FRONTEND_IMAGE=$FRONTEND_IMAGE;
        docker compose -f docker-compose.prod.yml pull;
        make prod-up;
      "
  only:
    - main
  environment:
    name: production
