services:
  backend:
    image: ${BACKEND_IMAGE:-aphantasia-backend:latest}
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - frontend_dist:/app/frontend_dist:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  frontend:
    image: ${FRONTEND_IMAGE:-aphantasia-frontend:latest}
    build:
      context: .
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_TELEGRAM_BOT_NAME: ${VITE_TELEGRAM_BOT_NAME}
        VITE_TELEGRAM_CLIENT_ID: ${VITE_TELEGRAM_CLIENT_ID}
        VITE_ADMIN_TELEGRAM_IDS: ${VITE_ADMIN_TELEGRAM_IDS}
        VITE_SITE_NAME: ${VITE_SITE_NAME}
        VITE_BASE_URL: ${VITE_BASE_URL}
    ports:
      - "${PROD_PORT:-80}:80"
    depends_on:
      - backend
      - db
    volumes:
      - frontend_dist:/usr/share/nginx/html
    restart: always

volumes:
  backend_data:
  postgres_data:
  frontend_dist:
