name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Telegram (Started)
        run: |
          chmod +x scripts/notify_deploy.sh
          ./scripts/notify_deploy.sh "started"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Ensure github.com is in known_hosts to avoid interactive prompts
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
            
            # Handle SSH Agent if needed for server-side git operations
            if [ -z "$SSH_AUTH_SOCK" ]; then
              eval $(ssh-agent -s)
              for key in id_rsa id_ed25519 id_ecdsa; do
                [ -f ~/.ssh/$key ] && ssh-add ~/.ssh/$key 2>/dev/null
              done
            fi
            
            # Check for .env file
            if [ ! -f .env ]; then
              echo "WARNING: .env file missing in $PWD. Build might use incorrect config."
            fi
            
            # Update source code reliably
            git fetch origin main
            git reset --hard origin/main
            
            # Build and restart containers
            make prod-build
            make prod-up

      - name: Notify Telegram (Success)
        if: success()
        run: ./scripts/notify_deploy.sh "success"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}

      - name: Notify Telegram (Failure)
        if: failure()
        run: ./scripts/notify_deploy.sh "failed"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}

