name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # Ensure github.com is in known_hosts to prevent verification errors
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
            
            # Start ssh-agent and add the deploy key to ensure git can use it
            eval $(ssh-agent -s)
            ssh-add ~/.ssh/id_rsa 2>/dev/null || ssh-add ~/.ssh/id_ed25519 2>/dev/null || echo "Using default keys"
            
            git remote set-url origin git@github.com:${{ github.repository }}.git
            git fetch origin
            git pull origin main
            make prod-build
            make prod-up
