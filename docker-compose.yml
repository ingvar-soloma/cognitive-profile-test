services:
  backend:
    image: ${BACKEND_IMAGE:-aphantasia-backend:latest}
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-lugabus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    restart: always

  frontend:
    image: ${FRONTEND_IMAGE:-aphantasia-frontend:latest}
    build:
      context: .
      target: base
    ports:
      - "${VITE_PORT:-3000}:${VITE_PORT:-3000}"
    volumes:
      - .:/app
      - /app/node_modules
    entrypoint: []
    command: npm run dev
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
  postgres_data:
